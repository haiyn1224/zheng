<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的约定 - 两年之约</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">⏳</div>
            <h1>我们的约定</h1>
            <p class="subtitle">两年之约，静待花开</p>
        </header>

        <!-- 倒计时区域 -->
        <div class="countdown-section">
            <div class="countdown-label">距离约定之日还有</div>
            <div class="countdown-timer">
                <div class="time-unit">
                    <div class="time-value" id="days">0</div>
                    <div class="time-label">天</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="hours">0</div>
                    <div class="time-label">时</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="minutes">0</div>
                    <div class="time-label">分</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="seconds">0</div>
                    <div class="time-label">秒</div>
                </div>
            </div>
            <div class="target-date">约定日期：<span id="targetDate">2028-01-01</span></div>
        </div>

        <!-- 进度条 -->
        <div class="progress-section">
            <div class="progress-label">
                <span>约定进度</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <!-- 日记列表 -->
        <div class="diary-section">
            <h2 class="section-title">约定之路</h2>
            <div class="diary-list" id="diaryList">
                <!-- 日记卡片将通过 JS 动态生成 -->
            </div>
        </div>

        <div class="add-entry">
            <a href="write.html" class="add-btn">+ 记录此刻</a>
        </div>

        <footer>
            <p>⏳ 静待两年之约</p>
            <p> blog.zhyqlf.online</p>
        </footer>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
